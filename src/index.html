<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>控制台 // 资源调度</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body class="min-h-screen bg-[#030712] text-zinc-100 antialiased flex flex-col justify-between font-sans selection:bg-indigo-500/30 text-xs">

  <!-- 顶部渐变微光 -->
  <div class="fixed inset-0 overflow-hidden pointer-events-none z-0">
    <div class="absolute top-[-25%] left-[-10%] w-[60vw] h-[60vw] rounded-full bg-indigo-500/[0.03] blur-[130px]"></div>
    <div class="absolute top-[-20%] right-[-10%] w-[50vw] h-[50vw] rounded-full bg-purple-500/[0.02] blur-[120px]"></div>
  </div>

  <!-- 主容器 -->
  <main class="relative z-10 max-w-5xl w-full mx-auto px-4 py-8 flex-1 flex flex-col justify-between">
    <div>
      <!-- 头部精简状态栏 -->
      <header class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-3 border-b border-zinc-900/80 pb-4 mb-5">
        <div class="flex items-center gap-3">
          <div class="flex items-center justify-center w-9 h-9 bg-gradient-to-br from-indigo-500/10 to-purple-500/10 border border-indigo-500/20 text-indigo-400 rounded-xl shadow-inner">
            <i class="fas fa-cubes text-sm"></i>
          </div>
          <div>
            <h1 class="text-sm font-bold text-white tracking-tight">应用远程配置调度大盘</h1>
            <p class="text-zinc-500 font-mono text-[10px] mt-0.5">环境架构 // CLOUDFLARE SECURE ROUTER</p>
          </div>
        </div>
        
        <!-- 免费计算记账器面板 -->
        <div class="flex items-center gap-2.5 font-mono text-[10px]">
          <div class="bg-zinc-900/60 border border-zinc-800/80 rounded-xl px-3 py-1 text-zinc-400 shadow-sm backdrop-blur-sm">
            本会话消耗 CF 请求: <span id="cfCounter" class="text-emerald-400 font-bold">1</span> 次
          </div>
          <button onclick="testAllLatency()" class="bg-indigo-600 hover:bg-indigo-500 text-white border border-indigo-500/30 px-3 py-1 rounded-xl font-medium transition-all duration-150 active:scale-95 flex items-center gap-1.5 shadow-md shadow-indigo-600/10">
            <i class="fas fa-bolt text-[9px]"></i> 聚合全网测速
          </button>
        </div>
      </header>

      <!-- 智能工具过滤栏 -->
      <section class="mb-4 flex flex-col sm:flex-row gap-3 items-center justify-between bg-zinc-900/20 border border-zinc-900 p-2 rounded-2xl backdrop-blur-md">
        <div class="relative w-full sm:max-w-xs">
          <span class="absolute inset-y-0 left-0 flex items-center pl-3 pointer-events-none text-zinc-600">
            <i class="fas fa-search text-[10px]"></i>
          </span>
          <input type="text" id="searchInput" placeholder="检索路由文件名..." class="w-full pl-8 pr-3 py-1.5 bg-zinc-950/40 border border-zinc-800/80 rounded-xl text-zinc-300 placeholder-zinc-600 focus:outline-none focus:border-indigo-500/40 transition-all text-[11px]">
        </div>
        <div id="categoryTabs" class="flex gap-1 p-1 bg-zinc-950/60 border border-zinc-900 rounded-xl text-[10px]"></div>
      </section>

      <!-- 核心微卡堆叠看板（解除日志感，变为高级卡片路由组件） -->
      <section id="linksGrid" class="space-y-2.5">
        <!-- 由数据动态流式渲染 -->
      </section>
    </div>
  </main>

  <!-- 安全锁弹窗 -->
  <div id="cryptoModal" class="hidden fixed inset-0 z-50 flex items-center justify-center bg-black/75 backdrop-blur-sm p-4 transition-all duration-300 opacity-0">
    <div class="bg-[#090d16] border border-zinc-800/80 p-5 rounded-2xl w-full max-w-xs text-center space-y-3.5 shadow-2xl">
        <div class="w-9 h-9 bg-indigo-500/10 text-indigo-400 border border-indigo-500/20 rounded-xl flex items-center justify-center mx-auto text-xs shadow-inner"><i class="fas fa-key"></i></div>
        <div>
          <h3 class="font-bold text-zinc-200 text-xs">安全生态锁已激活</h3>
          <p class="text-zinc-500 text-[10px] mt-0.5">调取内部原始明文资源需要进行身份验证</p>
        </div>
        <input type="password" id="modalKey" class="w-full text-center bg-zinc-950 p-2.5 rounded-xl border border-zinc-800 focus:outline-none focus:border-indigo-500/50 text-zinc-200 text-xs tracking-wider" placeholder="输入内部调度密钥" onkeydown="if(event.key==='Enter') executeSecureAction()">
        <div class="flex gap-2 text-[11px]">
            <button onclick="closeModal()" class="flex-1 py-1.5 text-zinc-500 hover:text-zinc-400 transition">取消</button>
            <button onclick="executeSecureAction()" class="flex-1 bg-indigo-600 hover:bg-indigo-500 py-1.5 rounded-xl font-bold transition-all shadow-md">确认授权</button>
        </div>
    </div>
  </div>

  <!-- 页脚 -->
  <footer class="py-4 text-center text-[10px] text-zinc-800 font-mono border-t border-zinc-950/60">
    <span>SYSTEM MONITOR ENGINE // POWERED BY EDGE CHIPS</span>
  </footer>

  <!-- 全局轻量通知 -->
  <div id="toast" class="fixed bottom-5 right-5 z-50 transform translate-y-4 opacity-0 pointer-events-none transition-all duration-300">
    <div id="toastContent" class="flex items-center gap-2 bg-zinc-900 border border-emerald-500/30 text-emerald-400 px-3.5 py-2 rounded-xl shadow-2xl text-[11px] font-mono backdrop-blur-md">
      <i class="fas fa-check-circle"></i><span id="toastText">操作成功</span>
    </div>
  </div>

  <script>
    let fetchedData = /*SERVER_DATA*/ []; 
    let currentTab = '全部';
    let pendingAction = { id: null, type: null };
    let cfRequestCount = 1; 

    // 配色与图标字典：.enc 文件焊死防护盾牌图标
    const extStyleMap = {
      json: { icon: "fas fa-file-code", label: "明文配置", theme: "border-cyan-500/20 bg-cyan-500/5 text-cyan-400" },
      enc: { icon: "fas fa-shield-alt", label: "加密密文", theme: "border-fuchsia-500/20 bg-fuchsia-500/5 text-fuchsia-400" },
      default: { icon: "fas fa-file-alt", label: "常规资产", theme: "border-zinc-700/50 bg-zinc-800/20 text-zinc-400" }
    };

    fetchedData = fetchedData.map(item => ({ ...item, latency: null, testing: false }));

    function updateCfCounter(count = 1) {
      cfRequestCount += count;
      document.getElementById('cfCounter').innerText = cfRequestCount;
    }

    function renderTabs() {
      const extensions = ['全部', ...new Set(fetchedData.map(item => item.ext.toUpperCase()))];
      document.getElementById('categoryTabs').innerHTML = extensions.map(ext => `
        <button onclick="switchTab('${ext}')" class="px-2.5 py-1 rounded-lg transition-all ${
          currentTab === ext ? 'bg-zinc-800 text-white border border-zinc-700/50 shadow' : 'text-zinc-500 hover:text-zinc-300'
        }">.${ext}</button>
      `).join('');
    }

    function renderGrid(keyword = '') {
      const grid = document.getElementById('linksGrid');
      const kw = keyword.toLowerCase().trim();
      const filtered = fetchedData.filter(item => (currentTab === '全部' || item.ext.toUpperCase() === currentTab) && (!kw || item.filename.toLowerCase().includes(kw)));

      if (filtered.length === 0) {
        grid.innerHTML = `<div class="text-center py-10 bg-zinc-900/10 border border-dashed border-zinc-900 rounded-2xl text-zinc-600 font-mono">未检索到任何资源文件</div>`;
        return;
      }

      grid.innerHTML = filtered.map(item => {
        const config = extStyleMap[item.ext] || extStyleMap.default;
        
        // 测速状态：演变为精密的胶囊药丸指示灯，融入复合标题流中
        let latencyHTML = `<span class="bg-zinc-950 text-zinc-600 border border-zinc-900 text-[9px] px-1.5 py-0.2 rounded font-mono">--</span>`;
        if (item.testing) {
          latencyHTML = `<span class="bg-indigo-500/10 border border-indigo-500/20 text-indigo-400 text-[9px] px-1.5 py-0.2 rounded font-mono animate-pulse"><i class="fas fa-circle-notch animate-spin text-[8px] mr-1"></i>PROBE</span>`;
        } else if (item.latency !== null) {
          if (item.latency === 'error') latencyHTML = `<span class="bg-rose-500/10 border border-rose-500/20 text-rose-400 text-[9px] px-1.5 py-0.2 rounded font-bold font-mono">ERR</span>`;
          else if (item.latency < 180) latencyHTML = `<span class="bg-emerald-500/10 border border-emerald-500/20 text-emerald-400 text-[9px] px-1.5 py-0.2 rounded font-mono font-bold"><i class="fas fa-bolt text-[8px] mr-0.5 text-emerald-500"></i>${item.latency}ms</span>`;
          else latencyHTML = `<span class="bg-amber-500/10 border border-amber-500/20 text-amber-400 text-[9px] px-1.5 py-0.2 rounded font-mono font-bold">${item.latency}ms</span>`;
        }

        // 微卡流架构设计：复合元数据整齐排布，告别系统日志感
        return `
          <div class="group bg-[#090d16]/30 border border-zinc-900/60 rounded-xl px-4 py-2.5 flex flex-col sm:flex-row sm:items-center justify-between gap-3 transition-all duration-200 hover:border-zinc-800 hover:bg-[#0d1321]/50 hover:shadow-lg shadow-indigo-500/[0.01]">
            <!-- 左侧：复合核心数据区块 -->
            <div class="flex items-center gap-3 overflow-hidden min-w-0 flex-1">
              <div class="w-8 h-8 rounded-lg border ${config.theme} flex items-center justify-center text-xs shrink-0 group-hover:scale-105 transition-transform duration-200 shadow-inner">
                <i class="${config.icon}"></i>
              </div>
              <div class="truncate">
                <div class="flex items-center gap-2">
                  <span class="font-semibold text-zinc-100 text-xs tracking-tight truncate group-hover:text-indigo-400 transition-colors">${item.filename}</span>
                  <div class="shrink-0 scale-95">${latencyHTML}</div>
                </div>
                <div class="text-[10px] text-zinc-500 font-mono mt-0.5 truncate flex items-center gap-1.5">
                  <span class="flex items-center gap-1"><i class="fas fa-folder text-[8px] text-zinc-700"></i>../${item.pathInfo}/</span>
                  <span class="text-zinc-800 font-bold">•</span>
                  <span class="font-bold tracking-wider uppercase text-[8px] ${config.theme.split(' ').pop()}">${config.label}</span>
                </div>
              </div>
            </div>
            
            <!-- 右侧：精简高整合操作区 -->
            <div class="flex items-center justify-end gap-2 shrink-0 self-end sm:self-center">
              <button onclick="triggerAction(${item.id}, 'copy')" class="bg-zinc-900 hover:bg-indigo-600 text-zinc-300 hover:text-white border border-zinc-800/80 hover:border-indigo-500 px-3 py-1 rounded-lg text-[10px] font-medium transition-all active:scale-95 flex items-center gap-1">
                <i class="fas fa-copy text-[9px]"></i> 复制路径
              </button>
              <button onclick="triggerAction(${item.id}, 'go')" class="bg-zinc-900/40 hover:bg-zinc-800 text-zinc-500 hover:text-indigo-400 border border-zinc-800/40 w-7 h-7 rounded-lg transition-all active:scale-95 flex items-center justify-center" title="直达路径">
                <i class="fas fa-external-link-alt text-[9px]"></i>
              </button>
            </div>
          </div>
        `;
      }).join('');
    }

    function switchTab(ext) { currentTab = ext; renderTabs(); renderGrid(document.getElementById('searchInput').value); }

    function triggerAction(id, type) {
      pendingAction = { id, type };
      const savedKey = localStorage.getItem('node_auth_pwd');
      if (savedKey) { executeSecureAction(savedKey); } else { openModal(); }
    }

    function openModal() {
      const m = document.getElementById('cryptoModal');
      m.classList.remove('hidden');
      setTimeout(() => m.classList.remove('opacity-0'), 10);
    }

    function closeModal() {
      const m = document.getElementById('cryptoModal');
      m.classList.add('opacity-0');
      setTimeout(() => m.classList.add('hidden'), 300);
      document.getElementById('modalKey').value = "";
    }

    async function executeSecureAction(providedKey) {
      const key = providedKey || document.getElementById('modalKey').value.trim();
      if(!key) return;

      try {
        updateCfCounter(1); 
        const res = await fetch(`/api/get-secure-link?id=${pendingAction.id}&key=${key}`);
        const result = await res.json();

        if(result.success) {
          localStorage.setItem('node_auth_pwd', key);
          closeModal();
          if(pendingAction.type === 'copy') {
            navigator.clipboard.writeText(result.url);
            showToast("📋 核心配置路径已安全复制");
          } else if(pendingAction.type === 'go') {
            window.open(result.url, '_blank');
          }
        } else { handleAuthFail(); }
      } catch(e) { handleAuthFail(); }
    }

    function handleAuthFail() {
      localStorage.removeItem('node_auth_pwd');
      showToast("✕ 验证授权失败", "error");
      const input = document.getElementById('modalKey');
      input.value = "";
      input.classList.add('border-rose-500', 'animate-shake');
      setTimeout(() => input.classList.remove('border-rose-500', 'animate-shake'), 500);
    }

    async function testAllLatency() {
      fetchedData.forEach(item => item.testing = true);
      renderGrid(document.getElementById('searchInput').value);
      
      try {
        updateCfCounter(1); // 1 次打包聚合请求
        const res = await fetch(`/api/ping-all`);
        const results = await res.json();
        
        results.forEach(resItem => {
          const target = fetchedData.find(item => item.id === resItem.id);
          if (target) {
            target.latency = resItem.success ? resItem.latency : 'error';
          }
        });
      } catch (e) {
        fetchedData.forEach(item => item.latency = 'error');
      } finally {
        fetchedData.forEach(item => item.testing = false);
        renderGrid(document.getElementById('searchInput').value);
      }
    }

    function showToast(msg, type = "success") {
      const toast = document.getElementById('toast');
      const text = document.getElementById('toastText');
      const content = document.getElementById('toastContent');
      text.innerText = msg;
      content.className = type === "success" 
        ? "flex items-center gap-2 bg-zinc-900 border border-emerald-500/30 text-emerald-400 px-3.5 py-2 rounded-xl shadow-2xl text-[11px] font-mono"
        : "flex items-center gap-2 bg-zinc-900 border border-rose-500/30 text-rose-400 px-3.5 py-2 rounded-xl shadow-2xl text-[11px] font-mono";
      toast.classList.remove('opacity-0', 'translate-y-4', 'pointer-events-none');
      toast.classList.add('opacity-100', 'translate-y-0');
      setTimeout(() => {
        toast.classList.add('opacity-0', 'translate-y-4', 'pointer-events-none');
        toast.classList.remove('opacity-100', 'translate-y-0');
      }, 2000);
    }

    document.getElementById('searchInput').addEventListener('input', (e) => renderGrid(e.target.value));
    
    renderTabs();
    renderGrid();
    setTimeout(testAllLatency, 300);
  </script>
  <style>
    @keyframes shake { 0%, 100% { transform: translateX(0); } 20%, 60% { transform: translateX(-6px); } 40%, 80% { transform: translateX(6px); } }
    .animate-shake { animation: shake 0.4s ease-in-out; }
  </style>
</body>
</html>
