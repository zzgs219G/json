<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>控制台 // 资源大盘</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    body { background-color: #f8fafc; color: #334155; }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 99px; }
    ::-webkit-scrollbar-track { background: transparent; }
  </style>
</head>
<body class="min-h-screen font-sans antialiased flex flex-col justify-between selection:bg-blue-500/20 text-xs">

  <!-- 清新现代 Light Mode 主容器 -->
  <main class="relative z-10 max-w-5xl w-full mx-auto px-4 py-8 md:py-12 flex-1 flex flex-col justify-between">
    <div class="space-y-6">
      
      <!-- 1. 顶栏状态信息区 -->
      <header class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4 border-b border-slate-200 pb-5">
        <div class="flex items-center gap-4">
          <!-- 💡 修复：采用极高质量的内联 SVG 图标，绝不丢失变空 -->
          <div class="w-11 h-11 bg-blue-600 rounded-xl flex items-center justify-center shadow-lg shadow-blue-600/30 shrink-0">
            <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"></path>
            </svg>
          </div>
          <div>
            <h1 class="text-sm sm:text-base font-bold text-slate-900 tracking-tight">远程资产管理调度面板</h1>
            <p class="text-slate-500 font-mono text-[10px] mt-0.5 tracking-wider uppercase">Security Level // Zero-Exposure</p>
          </div>
        </div>
        
        <!-- 账本看板 -->
        <div class="flex items-center gap-2.5 font-mono text-[10px] self-start sm:self-center">
          <div class="bg-white border border-slate-200 rounded-lg px-3 py-1.5 text-slate-500 shadow-sm">
            会话消耗 CF 请求: <span id="cfCounter" class="text-blue-600 font-bold text-[11px]">1</span> 次
          </div>
          <button onclick="syncRepository()" class="bg-white hover:bg-slate-50 text-slate-600 hover:text-blue-600 border border-slate-200 px-3 py-1.5 rounded-lg font-medium transition flex items-center gap-1.5 shadow-sm active:scale-95">
            <i class="fas fa-sync-alt text-[9px]"></i> 同步仓库
          </button>
        </div>
      </header>

      <!-- 2. 完美的搜索与筛选栏 -->
      <section class="flex flex-col md:flex-row gap-3 items-center justify-between bg-white border border-slate-200 p-2 rounded-xl shadow-sm">
        <div class="relative w-full md:max-w-xs">
          <span class="absolute inset-y-0 left-0 flex items-center pl-3.5 pointer-events-none text-slate-400">
            <i class="fas fa-search text-[10px]"></i>
          </span>
          <input type="text" id="searchInput" placeholder="搜索检索资源资产名称..." class="w-full h-9 pl-9 pr-4 bg-slate-50 border border-slate-200 rounded-lg text-slate-700 placeholder-slate-400 focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition-all text-[11px]">
        </div>
        <div id="categoryTabs" class="flex gap-1 p-1 bg-slate-50 border border-slate-200 rounded-lg text-[10px] w-full md:w-auto overflow-x-auto select-none">
          <!-- 动态类型标签 -->
        </div>
      </section>

      <!-- 3. 真·双端自适应卡片大盘 -->
      <section id="linksGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-3.5">
        <!-- 动态资产组件 -->
      </section>
    </div>
  </main>

  <!-- 4. 安全生态锁弹窗 -->
  <div id="cryptoModal" class="hidden fixed inset-0 z-50 flex items-center justify-center bg-slate-900/40 backdrop-blur-sm p-4 transition-all duration-300 opacity-0">
    <div class="bg-white border border-slate-200 p-6 rounded-2xl w-full max-w-xs text-center space-y-4 shadow-2xl">
        <div class="w-10 h-10 bg-blue-50 text-blue-600 rounded-full flex items-center justify-center mx-auto text-sm"><i class="fas fa-key"></i></div>
        <div>
          <h3 class="font-bold text-slate-900 text-sm">需要授权访问</h3>
          <p class="text-slate-500 text-[10px] mt-1">系统已将路径加密，请验证身份以全局解锁</p>
        </div>
        <input type="password" id="modalKey" class="w-full h-10 text-center bg-slate-50 p-2 rounded-xl border border-slate-200 focus:outline-none focus:border-blue-500 text-slate-800 text-xs tracking-widest" placeholder="输入调度密码" onkeydown="if(event.key==='Enter') executeSecureAction()">
        <div class="flex gap-2 text-[11px]">
            <button onclick="closeModal()" class="flex-1 py-2 text-slate-500 hover:bg-slate-50 rounded-xl transition font-medium">取消</button>
            <button onclick="executeSecureAction()" class="flex-1 bg-blue-600 hover:bg-blue-700 text-white py-2 rounded-xl font-bold transition shadow-md shadow-blue-500/30">全局解锁</button>
        </div>
    </div>
  </div>

  <!-- 全局提示器 -->
  <div id="toast" class="fixed bottom-6 right-6 z-50 transform translate-y-4 opacity-0 pointer-events-none transition-all duration-300">
    <div id="toastContent" class="flex items-center gap-2 bg-slate-800 text-white px-4 py-3 rounded-xl shadow-2xl text-[11px] font-mono">
      <i class="fas fa-check-circle text-emerald-400"></i><span id="toastText">操作成功</span>
    </div>
  </div>

  <script>
    let fetchedData = /*SERVER_DATA*/ []; 
    let currentTab = '全部';
    let pendingAction = { id: null, type: null };
    let cfRequestCount = 1; 

    // 🔒 核心重构：不仅存 URL，还存真实路径！
    let globalSecureData = {}; 

    const extStyleMap = {
  json: { icon: "fas fa-file-code", label: "明文配置", theme: "bg-blue-50 text-blue-600" },
  // ✅ 换回绝对稳定、所有免费库都支持的基础盾牌图标 fa-shield-alt 或者 fa-lock
  enc: { icon: "fas fa-shield-alt", label: "加密密文", theme: "bg-purple-50 text-purple-600" }, 
  default: { icon: "fas fa-file-alt", label: "常规资产", theme: "bg-slate-100 text-slate-600" }
};


    fetchedData = fetchedData.map(item => ({ ...item, latency: null, testing: false }));

    function updateCfCounter(count = 1) {
      cfRequestCount += count;
      document.getElementById('cfCounter').innerText = cfRequestCount;
    }

    function renderTabs() {
      const extensions = ['全部', ...new Set(fetchedData.map(item => item.ext.toUpperCase()))];
      document.getElementById('categoryTabs').innerHTML = extensions.map(ext => `
        <button onclick="switchTab('${ext}')" class="px-3 h-7 rounded-md transition-all ${
          currentTab === ext ? 'bg-white text-slate-800 border border-slate-200 shadow-sm font-bold' : 'text-slate-500 hover:text-slate-800'
        }">${ext === '全部' ? '全部' : '.' + ext}</button>
      `).join('');
    }

    function renderGrid(keyword = '') {
      const grid = document.getElementById('linksGrid');
      const kw = keyword.toLowerCase().trim();
      const filtered = fetchedData.filter(item => (currentTab === '全部' || item.ext.toUpperCase() === currentTab) && (!kw || item.filename.toLowerCase().includes(kw)));

      if (filtered.length === 0) {
        grid.innerHTML = `<div class="col-span-full text-center py-12 border border-dashed border-slate-300 rounded-2xl text-slate-400 font-mono">未检索到任何匹配资源</div>`;
        return;
      }

      grid.innerHTML = filtered.map(item => {
        const config = extStyleMap[item.ext] || extStyleMap.default;
        
        let latencyHTML = `<button onclick="measureLatency(${item.id})" class="bg-white hover:bg-slate-50 border border-slate-200 text-slate-500 text-[9px] px-2 h-5 rounded font-mono transition active:scale-95 shadow-sm">测速</button>`;
        
        if (item.testing) {
          latencyHTML = `<span class="bg-blue-50 text-blue-500 text-[9px] px-2 h-5 rounded flex items-center font-mono animate-pulse"><i class="fas fa-circle-notch animate-spin text-[8px] mr-1"></i>PING</span>`;
        } else if (item.latency !== null) {
          if (item.latency === 'error') {
            latencyHTML = `<button onclick="measureLatency(${item.id})" class="bg-red-50 text-red-500 text-[9px] px-2 h-5 rounded font-bold font-mono">ERR ↻</button>`;
          } else {
            const colorClass = item.latency < 180 ? 'text-emerald-600 bg-emerald-50' : 'text-amber-600 bg-amber-50';
            latencyHTML = `<button onclick="measureLatency(${item.id})" class="${colorClass} text-[9px] px-2 h-5 rounded flex items-center font-mono font-bold">${item.latency}ms</button>`;
          }
        }

        // 💡 动态路径渲染：如果有 globalSecureData，显示真路径；否则显示加密锁
        const secureInfo = globalSecureData[item.id];
        const pathHTML = secureInfo 
          ? `<span class="text-slate-500 bg-slate-100 px-1.5 py-0.5 rounded border border-slate-200 font-mono text-[9px]">../${secureInfo.pathInfo}/</span>`
          : `<span class="text-slate-400 bg-slate-50 px-1.5 py-0.5 rounded border border-slate-200 border-dashed font-mono text-[9px]"><i class="fas fa-lock text-[8px] mr-1"></i>路径已隐藏</span>`;

        // 清新白底卡片排版
        return `
          <div class="group bg-white border border-slate-200 rounded-xl p-4 flex flex-col justify-between gap-4 transition hover:border-blue-300 hover:shadow-md">
            
            <div class="flex items-start gap-3 w-full">
              <div class="w-9 h-9 rounded-lg ${config.theme} flex items-center justify-center text-sm shrink-0 group-hover:scale-105 transition-transform">
                <i class="${config.icon}"></i>
              </div>
              <div class="truncate flex-1">
                <div class="font-bold text-slate-800 text-xs tracking-tight truncate group-hover:text-blue-600 transition-colors" title="${item.filename}">${item.filename}</div>
                <div class="mt-1.5 flex items-center gap-1.5 overflow-hidden">
                  ${pathHTML}
                </div>
              </div>
            </div>
            
            <div class="flex items-center justify-between border-t border-slate-100 pt-3">
               <div class="shrink-0 scale-95 origin-left">${latencyHTML}</div>
               <div class="flex items-center gap-2">
                  <button onclick="triggerAction(${item.id}, 'copy')" class="bg-slate-100 hover:bg-slate-200 text-slate-700 px-3 h-7 rounded-lg text-[10px] font-medium transition active:scale-95 flex items-center gap-1">
                    <i class="fas fa-copy text-[9px]"></i> 复制
                  </button>
                  <button onclick="triggerAction(${item.id}, 'go')" class="bg-blue-50 hover:bg-blue-600 text-blue-600 hover:text-white w-7 h-7 rounded-lg transition flex items-center justify-center" title="直达路径">
                    <i class="fas fa-external-link-alt text-[9px]"></i>
                  </button>
               </div>
            </div>
          </div>
        `;
      }).join('');
    }

    function switchTab(ext) { currentTab = ext; renderTabs(); renderGrid(document.getElementById('searchInput').value); }

    function triggerAction(id, type) {
      pendingAction = { id, type };
      
      // 🎯 只要解锁过，全局数据就存在内存里，直接用！请求数 0！
      if (globalSecureData[id]) {
        if(type === 'copy') {
          navigator.clipboard.writeText(globalSecureData[id].url);
          showToast("📋 链接已提取");
        } else if(type === 'go') {
          window.open(globalSecureData[id].url, '_blank');
        }
        return;
      }

      const savedKey = localStorage.getItem('node_auth_pwd');
      if (savedKey) { executeSecureAction(savedKey); } else { openModal(); }
    }

    function openModal() {
      const m = document.getElementById('cryptoModal');
      m.classList.remove('hidden');
      setTimeout(() => m.classList.remove('opacity-0'), 10);
    }

    function closeModal() {
      const m = document.getElementById('cryptoModal');
      m.classList.add('opacity-0');
      setTimeout(() => m.classList.add('hidden'), 300);
      document.getElementById('modalKey').value = "";
    }

    async function executeSecureAction(providedKey) {
      const key = providedKey || document.getElementById('modalKey').value.trim();
      if(!key) return;

      try {
        // 🎯 核心改变：发一次请求，批量拿到所有URL和明文路径
        updateCfCounter(1); 
        const res = await fetch(`/api/get-secure-links?key=${key}`);
        const result = await res.json();

        if(result.success) {
          localStorage.setItem('node_auth_pwd', key);
          
          // 拿到所有真实数据，存入内存
          globalSecureData = result.data; 
          
          closeModal();
          // 💡 重点：重新渲染网格，所有的 [🔒 路径已隐藏] 将瞬间替换为真实的明文路径！
          renderGrid(document.getElementById('searchInput').value);

          if(pendingAction.type === 'copy') {
            navigator.clipboard.writeText(globalSecureData[pendingAction.id].url);
            showToast("📋 核心配置路径已安全复制");
          } else if(pendingAction.type === 'go') {
            window.open(globalSecureData[pendingAction.id].url, '_blank');
          }
        } else { handleAuthFail(); }
      } catch(e) { handleAuthFail(); }
    }

    function handleAuthFail() {
      localStorage.removeItem('node_auth_pwd');
      showToast("✕ 验证授权失败", "error");
      const input = document.getElementById('modalKey');
      input.value = "";
      input.classList.add('border-red-500', 'animate-shake');
      setTimeout(() => input.classList.remove('border-red-500', 'animate-shake'), 500);
    }

    async function measureLatency(id) {
      const target = fetchedData.find(item => item.id === id);
      if (!target) return;
      
      target.testing = true;
      renderGrid(document.getElementById('searchInput').value);
      const startTime = performance.now();
      
      try {
        updateCfCounter(1); 
        const res = await fetch(`/api/ping?id=${id}`);
        const result = await res.json();
        target.latency = result.success ? Math.round(performance.now() - startTime) : 'error';
      } catch (e) {
        target.latency = 'error';
      } finally {
        target.testing = false;
        renderGrid(document.getElementById('searchInput').value);
      }
    }

    async function syncRepository() {
      const savedKey = localStorage.getItem('node_auth_pwd');
      const key = savedKey || prompt("请输入开发密码刷新边缘大盘：");
      if(!key) return;

      try {
        updateCfCounter(1);
        const res = await fetch(`/api/flush-cache?key=${key}`);
        const result = await res.json();
        if(result.success) {
          localStorage.setItem('node_auth_pwd', key);
          showToast("♻️ 仓库数据已重置");
          setTimeout(() => location.reload(), 800);
        } else { showToast("✕ 验证未通过", "error"); }
      } catch(e) { showToast("✕ 网络故障", "error"); }
    }

    function showToast(msg, type = "success") {
      const toast = document.getElementById('toast');
      const text = document.getElementById('toastText');
      const content = document.getElementById('toastContent');
      text.innerText = msg;
      
      if(type === "error") {
        content.className = "flex items-center gap-2 bg-red-600 text-white px-4 py-3 rounded-xl shadow-2xl text-[11px] font-mono";
        content.innerHTML = `<i class="fas fa-times-circle text-white"></i><span id="toastText">${msg}</span>`;
      } else {
        content.className = "flex items-center gap-2 bg-slate-800 text-white px-4 py-3 rounded-xl shadow-2xl text-[11px] font-mono";
        content.innerHTML = `<i class="fas fa-check-circle text-emerald-400"></i><span id="toastText">${msg}</span>`;
      }

      toast.classList.remove('opacity-0', 'translate-y-4', 'pointer-events-none');
      toast.classList.add('opacity-100', 'translate-y-0');
      setTimeout(() => {
        toast.classList.add('opacity-0', 'translate-y-4', 'pointer-events-none');
        toast.classList.remove('opacity-100', 'translate-y-0');
      }, 2000);
    }

    document.getElementById('searchInput').addEventListener('input', (e) => renderGrid(e.target.value));
    
    renderTabs();
    renderGrid();
  </script>
  <style>
    @keyframes shake { 0%, 100% { transform: translateX(0); } 20%, 60% { transform: translateX(-6px); } 40%, 80% { transform: translateX(6px); } }
    .animate-shake { animation: shake 0.4s ease-in-out; }
  </style>
</body>
</html>
