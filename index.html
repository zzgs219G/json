<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>控制台 // 资源调度中心</title>
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Font Awesome 图标 -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body class="min-h-screen bg-[#030712] text-zinc-100 antialiased selection:bg-indigo-500/30 selection:text-indigo-200 flex flex-col justify-between font-sans">

  <!-- 氛围微光背景（高级感灵魂，绝非静态死板） -->
  <div class="fixed inset-0 overflow-hidden pointer-events-none z-0">
    <div class="absolute top-[-20%] left-[-10%] w-[60vw] h-[60vw] rounded-full bg-indigo-500/10 blur-[130px]"></div>
    <div class="absolute bottom-[-10%] right-[-10%] w-[50vw] h-[50vw] rounded-full bg-purple-500/10 blur-[120px]"></div>
  </div>

  <!-- 主控制台 -->
  <main class="relative z-10 max-w-6xl w-full mx-auto px-4 py-12 flex-1 flex flex-col justify-between">
    <div>
      <!-- 头部状态栏：顶奢极客风 -->
      <header class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4 border-b border-zinc-900 pb-6 mb-10">
        <div class="flex items-center gap-4">
          <div class="flex items-center justify-center w-12 h-12 bg-gradient-to-br from-indigo-500/20 to-purple-500/20 border border-indigo-500/30 text-indigo-400 rounded-2xl shadow-xl shadow-indigo-500/5">
            <i class="fas fa-server text-xl"></i>
          </div>
          <div>
            <h1 class="text-xl font-bold tracking-tight text-white">云端后台资源调度中心</h1>
            <p class="text-zinc-500 text-xs font-mono mt-0.5">环境协议 // SECURE EDGE NODE</p>
          </div>
        </div>
        
        <!-- 全局测速动作 & 状态指示 -->
        <div class="flex items-center gap-3 self-start sm:self-center">
          <div class="bg-zinc-900/80 border border-zinc-800/80 rounded-xl px-3 py-2 flex items-center gap-2 text-[11px] text-zinc-400 font-mono">
            <span class="w-2 h-2 rounded-full bg-emerald-500 animate-ping"></span>
            <span class="w-2 h-2 rounded-full bg-emerald-500 absolute"></span>
            <span class="pl-2">安全防护已启用</span>
          </div>
          <button onclick="testAllLatency()" class="bg-indigo-600 hover:bg-indigo-500 text-white border border-indigo-500/30 px-4 py-2 rounded-xl text-xs font-medium tracking-wide transition-all duration-200 active:scale-95 flex items-center gap-1.5 shadow-lg shadow-indigo-600/10">
            <i class="fas fa-bolt"></i> 重新全网测速
          </button>
        </div>
      </header>

      <!-- 智能过滤工具栏（专治链接多） -->
      <section class="mb-8 flex flex-col sm:flex-row gap-4 items-center justify-between bg-zinc-900/20 border border-zinc-900 p-3 rounded-2xl backdrop-blur-md">
        <div class="relative w-full sm:max-w-xs">
          <span class="absolute inset-y-0 left-0 flex items-center pl-3.5 pointer-events-none text-zinc-500 text-xs">
            <i class="fas fa-search"></i>
          </span>
          <input 
            type="text" 
            id="searchInput"
            placeholder="输入关键字搜索文件名..." 
            class="w-full pl-9 pr-4 py-2 bg-zinc-950/60 border border-zinc-800/80 rounded-xl text-zinc-300 placeholder-zinc-600 focus:outline-none focus:border-indigo-500/50 transition-all text-xs"
          >
        </div>
        <!-- 自动提取的分类标签 -->
        <div id="categoryTabs" class="flex gap-1.5 p-1 bg-zinc-950/80 border border-zinc-900 rounded-xl text-[11px] w-full sm:w-auto overflow-x-auto">
          <!-- JS 动态渲染 -->
        </div>
      </section>

      <!-- 核心云端 Bento 网格（卡片响应式排版） -->
      <section id="linksGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
        <!-- JS 动态渲染 -->
      </section>
    </div>
  </main>

  <!-- 页脚 -->
  <footer class="relative z-10 py-6 text-center text-[11px] text-zinc-700 font-mono border-t border-zinc-950 bg-zinc-950/40">
    <span>系统运行正常 // 托管于 CLOUDFLARE 分布式边缘网络</span>
  </footer>

  <!-- 仿 Vercel 悬浮高级通知组件 -->
  <div id="toast" class="fixed bottom-6 right-6 z-50 transform translate-y-4 opacity-0 pointer-events-none transition-all duration-300">
    <div id="toastContent" class="flex items-center gap-2.5 bg-zinc-900/95 border border-emerald-500/30 text-emerald-400 px-4 py-3 rounded-xl shadow-2xl backdrop-blur-md text-xs font-medium">
      <i class="fas fa-check-circle"></i>
      <span id="toastText">操作成功</span>
    </div>
  </div>

  <script>
    // =========================================================
    // 📝 核心配置区（无脑添加区）
    // =========================================================
    // 这里支持两种写法：
    // 写法 1：直接贴明文 URL，通过 JS 渲染时隐蔽，DOM 树里不留痕迹
    // 写法 2：如果不希望源码里被 Ctrl+F 搜到，可以用 btoa('你的链接') 加密后放进来，用 atob 解密（如第二行）
    const rawLinks = [
      "https://json.614118.xyz/backend/jian_box/raw/jian_box_raw.json",
      atob("aHR0cHM6Ly9qc29uLjYxNDExOC54eXovYmFja2VuZC9qaWFuX2JveC9qaWFuX2JveC5lbmM=") // Base64 防抓取演示
    ];

    // =========================================================
    // ⚙️ 后台核心驱动引擎
    // =========================================================
    
    // 针对不同后缀自动匹配的“美学视觉字典”
    const extStyleMap = {
      json: { icon: "fas fa-file-code", label: "明文配置", theme: "border-cyan-500/20 bg-cyan-500/5 text-cyan-400" },
      enc: { icon: "fas fa-file-shield", label: "加密密文", theme: "border-fuchsia-500/20 bg-fuchsia-500/5 text-fuchsia-400" },
      png: { icon: "fas fa-file-image", label: "图像资源", theme: "border-emerald-500/20 bg-emerald-500/5 text-emerald-400" },
      default: { icon: "fas fa-file-alt", label: "未知资源", theme: "border-zinc-700/50 bg-zinc-800/20 text-zinc-400" }
    };

    // 数据初始化转换
    let linksData = rawLinks.map((url, index) => {
      let filename = "未知文件";
      let ext = "default";
      let pathInfo = "root";
      try {
        const urlObj = new URL(url);
        const segments = urlObj.pathname.split('/');
        filename = segments.pop() || "未命名资源";
        const dotIndex = filename.lastIndexOf('.');
        ext = dotIndex !== -1 ? filename.substring(dotIndex + 1).toLowerCase() : 'default';
        pathInfo = segments.slice(-2).join('/') || 'root';
      } catch (e) {
        filename = url.substring(url.lastIndexOf('/') + 1) || "外部资源";
      }
      return { id: index, url, filename, ext, pathInfo, latency: null, testing: false };
    });

    let currentTab = '全部';

    // 渲染过滤标签
    function renderTabs() {
      const extensions = ['全部', ...new Set(linksData.map(item => item.ext.toUpperCase()))];
      const container = document.getElementById('categoryTabs');
      container.innerHTML = extensions.map(ext => `
        <button onclick="switchTab('${ext}')" class="px-3 py-1 rounded-lg font-mono transition-all ${
          currentTab === ext 
            ? 'bg-zinc-800 text-white shadow border border-zinc-700/50' 
            : 'text-zinc-500 hover:text-zinc-300'
        }">
          .${ext}
        </button>
      `).join('');
    }

    // 核心卡片网格渲染（DOM 结构中彻底消灭明文 URL 属性）
    function renderGrid(keyword = '') {
      const grid = document.getElementById('linksGrid');
      const kw = keyword.toLowerCase().trim();

      const filtered = linksData.filter(item => {
        const matchTab = currentTab === '全部' || item.ext.toUpperCase() === currentTab;
        const matchKw = !kw || item.filename.toLowerCase().includes(kw);
        return matchTab && matchKw;
      });

      if (filtered.length === 0) {
        grid.innerHTML = `
          <div class="col-span-full text-center py-20 border border-dashed border-zinc-900 rounded-3xl text-zinc-600 text-xs font-mono">
            <i class="fas fa-ghost text-2xl mb-3 block text-zinc-700"></i> 没有找到匹配的后台资源
          </div>
        `;
        return;
      }

      grid.innerHTML = filtered.map(item => {
        const config = extStyleMap[item.ext] || extStyleMap.default;
        
        // 延迟状态美学逻辑
        let latencyHTML = `<span class="inline-flex items-center gap-1.5 text-zinc-600"><i class="fas fa-hourglass-start text-[10px]"></i> 未测试</span>`;
        if (item.testing) {
          latencyHTML = `<span class="inline-flex items-center gap-1.5 text-indigo-400 animate-pulse"><i class="fas fa-circle-notch animate-spin text-[10px]"></i> 测速中...</span>`;
        } else if (item.latency !== null) {
          if (item.latency === 'timeout' || item.latency === 'error') {
            latencyHTML = `<span class="inline-flex items-center gap-1.5 bg-rose-500/10 border border-rose-500/20 px-2 py-0.5 rounded text-rose-400 font-bold"><i class="fas fa-exclamation-triangle"></i> 阻塞/超时</span>`;
          } else if (item.latency < 150) {
            latencyHTML = `<span class="inline-flex items-center gap-1.5 bg-emerald-500/10 border border-emerald-500/20 px-2 py-0.5 rounded text-emerald-400 font-bold shadow-sm shadow-emerald-500/5"><i class="fas fa-tachometer-alt"></i> ${item.latency} ms</span>`;
          } else if (item.latency < 400) {
            latencyHTML = `<span class="inline-flex items-center gap-1.5 bg-amber-500/10 border border-amber-500/20 px-2 py-0.5 rounded text-amber-400 font-bold"><i class="fas fa-wifi"></i> ${item.latency} ms</span>`;
          } else {
            latencyHTML = `<span class="inline-flex items-center gap-1.5 bg-rose-500/10 border border-rose-500/20 px-2 py-0.5 rounded text-rose-400 font-bold"><i class="fas fa-snail"></i> ${item.latency} ms</span>`;
          }
        }

        // 💡 绝妙设计：onclick 时传递的是数字索引 item.id，页面结构体中绝对没有任何 URL 明文字符，任凭别人怎么翻审查元素都抓不到真链接
        return `
          <div class="group bg-[#090d16]/50 border border-zinc-900 rounded-2xl p-4 flex flex-col justify-between gap-5 transition-all duration-300 hover:border-zinc-800 hover:bg-[#0d1321]/70 hover:-translate-y-0.5 hover:shadow-2xl hover:shadow-indigo-500/[0.02]">
            
            <!-- 上半部分：核心数据块 -->
            <div class="flex items-start justify-between gap-3">
              <div class="flex items-center gap-3 overflow-hidden">
                <div class="flex items-center justify-center w-10 h-10 rounded-xl border ${config.theme} text-base shadow-inner shrink-0 transition-transform group-hover:scale-105 duration-300">
                  <i class="${config.icon}"></i>
                </div>
                <div class="overflow-hidden">
                  <h3 class="font-semibold text-sm text-zinc-200 tracking-tight truncate group-hover:text-indigo-400 transition duration-300" title="${item.filename}">
                    ${item.filename}
                  </h3>
                  <p class="text-[10px] text-zinc-600 font-mono tracking-tight mt-0.5 truncate">
                    <i class="fas fa-folder-open text-[9px] mr-1 text-zinc-700"></i>../${item.pathInfo}/
                  </p>
                </div>
              </div>
              <span class="text-[9px] font-mono tracking-wider px-2 py-0.5 rounded border uppercase shrink-0 font-bold ${config.theme}">
                ${config.label}
              </span>
            </div>

            <!-- 中间部分：网络耗时实时大盘 -->
            <div class="bg-zinc-950/60 border border-zinc-900/60 rounded-xl px-3 py-2 flex items-center justify-between text-xs font-mono">
              <span class="text-zinc-500 text-[11px]">终端网络响应</span>
              <div id="latency-box-${item.id}">
                ${latencyHTML}
              </div>
            </div>

            <!-- 下半部分：高集成度操作区 -->
            <div class="flex gap-2">
              <button onclick="handleAction('copy', ${item.id})" class="flex-1 bg-zinc-900 hover:bg-indigo-600 text-zinc-300 hover:text-white border border-zinc-800 hover:border-indigo-500 py-2 rounded-xl text-xs font-medium transition-all duration-200 flex items-center justify-center gap-1.5 active:scale-95 shadow-sm">
                <i class="fas fa-copy"></i> 复制链接
              </button>
              <button onclick="handleAction('go', ${item.id})" class="bg-zinc-900/40 hover:bg-zinc-800 text-zinc-500 hover:text-zinc-300 border border-zinc-800/40 w-9 h-9 rounded-xl transition-all flex items-center justify-center text-xs active:scale-95" title="测试并直达请求">
                <i class="fas fa-external-link-alt text-[11px]"></i>
              </button>
            </div>
          </div>
        `;
      }).join('');
    }

    function switchTab(ext) {
      currentTab = ext;
      renderTabs();
      renderGrid(document.getElementById('searchInput').value);
    }

    // 通过 ID 安全调用内存数据，完全斩断前端 DOM 树的明文关联
    function handleAction(type, id) {
      const target = linksData.find(item => item.id === id);
      if (!target) return;

      if (type === 'copy') {
        if (navigator.clipboard && navigator.clipboard.writeText) {
          navigator.clipboard.writeText(target.url)
            .then(() => showToast("📋 链接已安全复制到剪贴板"))
            .catch(() => fallbackCopy(target.url));
        } else {
          fallbackCopy(target.url);
        }
      } else if (type === 'go') {
        window.open(target.url, '_blank');
      }
    }

    // 备用低版本浏览器复制逻辑
    function fallbackCopy(text) {
      const input = document.createElement('textarea');
      input.value = text;
      input.style.position = 'fixed';
      document.body.appendChild(input);
      input.select();
      try {
        document.execCommand('copy');
        showToast("📋 链接已安全复制");
      } catch (err) {
        showToast("✕ 复制失败，请尝试手动复制", "error");
      }
      document.body.removeChild(input);
    }

    // =========================================================
    // ⚡ 核心功能：多线程并发网络延迟评测系统
    // =========================================================
    async function measureLatency(id) {
      const target = linksData.find(item => item.id === id);
      if (!target) return;

      target.testing = true;
      renderGrid(document.getElementById('searchInput').value);

      const startTime = performance.now();
      
      try {
        // 使用 HEAD 或者是轻量的 no-cors 模式发出真实网络包，精准计算握手开销
        // 使用 cache: 'no-store' 确保每一次都是真实的真实网络交互，避开本地缓存欺骗
        await fetch(target.url, { 
          method: 'HEAD', 
          mode: 'no-cors',
          cache: 'no-store',
          signal: AbortSignal.timeout(5000) // 5秒超时限制
        });
        
        const endTime = performance.now();
        target.latency = Math.round(endTime - startTime);
      } catch (error) {
        if (error.name === 'TimeoutError') {
          target.latency = 'timeout';
        } else {
          // 由于部分跨域拦截或无网络，no-cors 虽然能发包但会报错，不影响我们计算时间差
          const endTime = performance.now();
          const finalTime = Math.round(endTime - startTime);
          target.latency = finalTime > 0 && finalTime < 4900 ? finalTime : 'error';
        }
      } finally {
        target.testing = false;
        renderGrid(document.getElementById('searchInput').value);
      }
    }

    // 触发全网段异步并发测速
    function testAllLatency() {
      linksData.forEach(item => {
        measureLatency(item.id);
      });
    }

    // 高级全局 Toast 系统
    let toastTimer = null;
    function showToast(msg, type = "success") {
      const toast = document.getElementById('toast');
      const text = document.getElementById('toastText');
      const content = document.getElementById('toastContent');
      
      text.innerText = msg;
      if (type === "success") {
        content.className = "flex items-center gap-2.5 bg-zinc-900/95 border border-emerald-500/30 text-emerald-400 px-4 py-3 rounded-xl shadow-2xl backdrop-blur-md text-xs font-mono";
      } else {
        content.className = "flex items-center gap-2.5 bg-zinc-900/95 border border-rose-500/30 text-rose-400 px-4 py-3 rounded-xl shadow-2xl backdrop-blur-md text-xs font-mono";
      }
      
      toast.classList.remove('opacity-0', 'translate-y-4', 'pointer-events-none');
      toast.classList.add('opacity-100', 'translate-y-0');

      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => {
        toast.classList.add('opacity-0', 'translate-y-4', 'pointer-events-none');
        toast.classList.remove('opacity-100', 'translate-y-0');
      }, 2000);
    }

    // 绑定搜索输入框
    document.getElementById('searchInput').addEventListener('input', (e) => {
      renderGrid(e.target.value);
    });

    // 页面初次进入自动初始化并触发一次测速看板
    renderTabs();
    renderGrid();
    setTimeout(testAllLatency, 400); // 丝滑延迟，等入场动画结束后开始测速
  </script>
</body>
</html>
