<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>控制台 · 快捷导航</title>
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Font Awesome 图标 -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body class="min-h-screen bg-slate-950 text-slate-100 antialiased selection:bg-purple-500/30 selection:text-purple-200">

  <!-- 背景炫光装饰（高级感靠这个撑） -->
  <div class="fixed inset-0 overflow-hidden pointer-events-none z-0">
    <div class="absolute -top-[40%] -left-[20%] w-[80vw] h-[80vw] rounded-full bg-purple-900/15 blur-[120px]"></div>
    <div class="absolute -top-[20%] -right-[20%] w-[60vw] h-[60vw] rounded-full bg-indigo-900/15 blur-[100px]"></div>
  </div>

  <!-- 主容器 -->
  <main class="relative z-10 max-w-4xl mx-auto px-4 py-12 min-h-screen flex flex-col justify-between">
    
    <div>
      <!-- 头部：标题与核心统计 -->
      <header class="text-center mb-10">
        <div class="inline-flex items-center justify-center p-3 bg-purple-500/10 rounded-2xl border border-purple-500/20 mb-4 shadow-inner">
          <i class="fas fa-terminal text-2xl text-purple-400"></i>
        </div>
        <h1 class="text-3xl font-extrabold tracking-tight bg-clip-text text-transparent bg-gradient-to-r from-white via-slate-200 to-slate-400">
          后台数据控制台
        </h1>
        <p class="text-slate-400 text-sm mt-2">一键复制配置链接 · 实时分类过滤</p>
      </header>

      <!-- 搜索与筛选工具栏（链接变多后的救星） -->
      <section class="mb-8 space-y-4">
        <!-- 搜索框 -->
        <div class="relative max-w-md mx-auto">
          <span class="absolute inset-y-0 left-0 flex items-center pl-4 pointer-events-none text-slate-500">
            <i class="fas fa-search"></i>
          </span>
          <input 
            type="text" 
            id="searchInput"
            placeholder="搜索链接名称、类型、URL..." 
            class="w-full pl-11 pr-4 py-3 bg-slate-900/60 border border-slate-800 rounded-2xl text-slate-200 placeholder-slate-500 focus:outline-none focus:border-purple-500/50 focus:ring-2 focus:ring-purple-500/10 transition-all backdrop-blur-md"
          >
        </div>

        <!-- 分类切换标签 (由 JS 动态生成，你不用管) -->
        <div id="categoryTabs" class="flex flex-wrap justify-center gap-2 max-w-xl mx-auto text-xs">
          <!-- 动态渲染项 -->
        </div>
      </section>

      <!-- 链接卡片网格容器（支持单列/多列自适应） -->
      <section id="linksGrid" class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <!-- 由 JS 根据数据渲染，未来有 100 个链接也会整整齐齐 -->
      </section>
    </div>

    <!-- 页脚 -->
    <footer class="mt-16 text-center text-xs text-slate-600 space-y-2 border-t border-slate-900 pt-6">
      <p><i class="fas fa-cloud-sun mr-1"></i> Powered by Cloudflare Edge & Tailwind Ecosystem</p>
      <p>
        <a href="https://json.614118.xyz" target="_blank" class="hover:text-purple-400 transition underline decoration-slate-800 underline-offset-4">json.614118.xyz</a>
      </p>
    </footer>
  </main>

  <!-- 全局轻量级 Toast 提示 -->
  <div id="toast" class="fixed bottom-6 left-1/2 -translate-x-1/2 z-50 transform translate-y-4 opacity-0 pointer-events-none transition-all duration-300">
    <div class="flex items-center gap-2 bg-slate-900/90 border border-emerald-500/30 text-emerald-400 px-5 py-3 rounded-2xl shadow-xl backdrop-blur-md text-sm font-medium">
      <i class="fas fa-check-circle text-base"></i>
      <span id="toastText">已复制到剪贴板</span>
    </div>
  </div>

  <!-- 数据与核心逻辑脚本 -->
  <script>
    /**
     * 💡 划重点：以后你加链接，只管改下面这个 linksData 数组就行了！！
     * 字段说明：
     * name: 按钮显示的标题
     * url: 你的后台实际 json/enc 链接
     * type: 标签名字（比如 RAW, 加密, 生产, 测试，会根据这个自动生成分类过滤器）
     * icon: 图标样式，参考 font-awesome (如: fas fa-file-code)
     * color: 标签颜色类别，支持：purple, amber, blue, emerald, rose
     */
    const linksData = [
      {
        name: "明文 JSON",
        url: "https://json.614118.xyz/backend/jian_box/raw/jian_box_raw.json",
        type: "RAW",
        icon: "fas fa-file-alt",
        color: "purple"
      },
      {
        name: "密文 ENC",
        url: "https://json.614118.xyz/backend/jian_box/jian_box.enc",
        type: "加密",
        icon: "fas fa-lock",
        color: "amber"
      }
      // 📝 以后想加新链接，直接在下面这样加一行就行：
      // , { name: "测试配置", url: "https://xxx.xyz/test.json", type: "测试", icon: "fas fa-flask", color: "blue" }
    ];

    // 配色方案映射表
    const colorMap = {
      purple: { bg: 'bg-purple-500/10', text: 'text-purple-400', border: 'border-purple-500/20', hover: 'hover:border-purple-500/40' },
      amber: { bg: 'bg-amber-500/10', text: 'text-amber-400', border: 'border-amber-500/20', hover: 'hover:border-amber-500/40' },
      blue: { bg: 'bg-blue-500/10', text: 'text-blue-400', border: 'border-blue-500/20', hover: 'hover:border-blue-500/40' },
      emerald: { bg: 'bg-emerald-500/10', text: 'text-emerald-400', border: 'border-emerald-500/20', hover: 'hover:border-emerald-500/40' },
      rose: { bg: 'bg-rose-500/10', text: 'text-rose-400', border: 'border-rose-500/20', hover: 'hover:border-rose-500/40' }
    };

    let currentCategory = '全部';

    // 渲染分类 Tab
    function renderTabs() {
      const types = ['全部', ...new Set(linksData.map(item => item.type))];
      const container = document.getElementById('categoryTabs');
      container.innerHTML = types.map(type => `
        <button onclick="switchCategory('${type}')" class="px-3 py-1.5 rounded-xl border transition-all ${
          currentCategory === type 
            ? 'bg-purple-600 border-purple-500 text-white shadow-lg shadow-purple-600/20' 
            : 'bg-slate-900/40 border-slate-800 text-slate-400 hover:text-slate-200 hover:border-slate-700'
        }">
          ${type}
        </button>
      `).join('');
    }

    // 渲染核心网格
    function renderGrid(keyword = '') {
      const grid = document.getElementById('linksGrid');
      const kw = keyword.toLowerCase().trim();

      // 过滤数据
      const filtered = linksData.filter(item => {
        const matchCategory = currentCategory === '全部' || item.type === currentCategory;
        const matchKeyword = !kw || 
                            item.name.toLowerCase().includes(kw) || 
                            item.type.toLowerCase().includes(kw) || 
                            item.url.toLowerCase().includes(kw);
        return matchCategory && matchKeyword;
      });

      if (filtered.length === 0) {
        grid.innerHTML = `
          <div class="col-span-full text-center py-12 text-slate-500 text-sm">
            <i class="fas fa-folder-open text-2xl mb-2 block"></i> 没有找到相关的后台链接
          </div>
        `;
        return;
      }

      grid.innerHTML = filtered.map(item => {
        const theme = colorMap[item.color] || colorMap.purple;
        return `
          <div class="group relative bg-slate-900/40 border border-slate-800/80 rounded-2xl p-5 flex flex-col justify-between gap-4 backdrop-blur-md transition-all duration-300 hover:border-slate-700 hover:bg-slate-900/60 hover:-translate-y-0.5 hover:shadow-xl">
            
            <!-- 上半部分：信息展示 -->
            <div class="flex items-start justify-between gap-2">
              <div class="flex items-center gap-3">
                <div class="flex items-center justify-center w-10 h-10 rounded-xl ${theme.bg} ${theme.text} border ${theme.border}">
                  <i class="${item.icon} text-lg"></i>
                </div>
                <div>
                  <h3 class="font-semibold text-slate-200 group-hover:text-purple-400 transition duration-300">${item.name}</h3>
                  <p class="text-xs text-slate-500 font-mono tracking-tight mt-0.5 max-w-[180px] sm:max-w-[240px] truncate" title="${item.url}">
                    ${item.url}
                  </p>
                </div>
              </div>
              <span class="text-[10px] font-bold tracking-wider px-2 py-0.5 rounded-md uppercase ${theme.bg} ${theme.text} border ${theme.border}">
                ${item.type}
              </span>
            </div>

            <!-- 下半部分：操作按钮 -->
            <div class="flex gap-2 border-t border-slate-800/60 pt-3">
              <button onclick="copyText('${item.url}')" class="flex-1 bg-slate-800 hover:bg-purple-600 text-slate-300 hover:text-white py-2 rounded-xl text-xs font-medium transition-all duration-200 flex items-center justify-center gap-1.5 active:scale-95 shadow-sm">
                <i class="fas fa-copy"></i> 复制链接
              </button>
              <a href="${item.url}" target="_blank" class="bg-slate-800/50 hover:bg-slate-700 text-slate-400 hover:text-slate-200 w-9 h-9 rounded-xl transition flex items-center justify-center text-xs active:scale-95" title="直达链接">
                <i class="fas fa-arrow-up-right-from-square"></i>
              </a>
            </div>
          </div>
        `;
      }).join('');
    }

    // 分类切换
    function switchCategory(cat) {
      currentCategory = cat;
      renderTabs();
      renderGrid(document.getElementById('searchInput').value);
    }

    // 核心复制函数
    function copyText(text) {
      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(text).then(() => showToast('🚀 链接已成功复制！')).catch(() => fallbackCopy(text));
      } else {
        fallbackCopy(text);
      }
    }

    // 备用老旧浏览器复制方案
    function fallbackCopy(text) {
      const input = document.createElement('textarea');
      input.value = text;
      input.style.position = 'fixed'; // 避免网页滚蛋
      document.body.appendChild(input);
      input.select();
      try {
        document.execCommand('copy');
        showToast('🚀 链接已成功复制（备用方案）！');
      } catch (err) {
        showToast('❌ 复制失败，请手动长按复制');
      }
      document.body.removeChild(input);
    }

    // 提示通知
    let toastTimer = null;
    function showToast(msg) {
      const toast = document.getElementById('toast');
      document.getElementById('toastText').innerText = msg;
      
      toast.classList.remove('opacity-0', 'translate-y-4', 'pointer-events-none');
      toast.classList.add('opacity-100', 'translate-y-0');

      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => {
        toast.classList.add('opacity-0', 'translate-y-4', 'pointer-events-none');
        toast.classList.remove('opacity-100', 'translate-y-0');
      }, 2000);
    }

    // 监听输入框实时搜索
    document.getElementById('searchInput').addEventListener('input', (e) => {
      renderGrid(e.target.value);
    });

    // 初始化运行
    renderTabs();
    renderGrid();
  </script>
</body>
</html>
