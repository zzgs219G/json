<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>导航 · 工具箱</title>
  <!-- Font Awesome 图标库（免费） -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    /* 全局重置 & 字体 */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      min-height: 100vh;
      background: linear-gradient(145deg, #0f0c29, #302b63, #24243e);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .container {
      max-width: 600px;
      width: 100%;
      background: rgba(255, 255, 255, 0.07);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-radius: 48px;
      padding: 40px 30px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.6);
      border: 1px solid rgba(255, 255, 255, 0.08);
      transition: all 0.3s ease;
    }
    h1 {
      font-size: 28px;
      font-weight: 600;
      color: #fff;
      text-align: center;
      margin-bottom: 8px;
      letter-spacing: -0.5px;
    }
    .subtitle {
      text-align: center;
      color: rgba(255, 255, 255, 0.5);
      font-size: 15px;
      margin-bottom: 36px;
      font-weight: 400;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      padding-bottom: 20px;
    }
    .card {
      background: rgba(255, 255, 255, 0.06);
      border-radius: 24px;
      padding: 20px 24px;
      margin-bottom: 18px;
      border: 1px solid rgba(255, 255, 255, 0.06);
      transition: all 0.25s ease;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
    }
    .card:hover {
      background: rgba(255, 255, 255, 0.12);
      border-color: rgba(255, 255, 255, 0.15);
      transform: translateY(-2px);
      box-shadow: 0 12px 30px -10px rgba(0,0,0,0.4);
    }
    .card .label {
      display: flex;
      align-items: center;
      gap: 12px;
      color: #fff;
      font-weight: 500;
      font-size: 16px;
    }
    .card .label i {
      font-size: 20px;
      width: 28px;
      color: #a78bfa; /* 淡紫色 */
    }
    .card .label .badge {
      font-size: 12px;
      background: rgba(167, 139, 250, 0.2);
      color: #c4b5fd;
      padding: 2px 12px;
      border-radius: 40px;
      font-weight: 400;
      margin-left: 4px;
    }
    .card .actions {
      display: flex;
      gap: 8px;
      flex-shrink: 0;
    }
    .btn {
      background: rgba(255, 255, 255, 0.07);
      border: none;
      color: #fff;
      padding: 8px 16px;
      border-radius: 40px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s ease;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      border: 1px solid transparent;
      text-decoration: none;
    }
    .btn i {
      font-size: 14px;
    }
    .btn-copy {
      background: rgba(167, 139, 250, 0.15);
      color: #c4b5fd;
      border-color: rgba(167, 139, 250, 0.2);
    }
    .btn-copy:hover {
      background: rgba(167, 139, 250, 0.3);
      border-color: #a78bfa;
    }
    .btn-copy.copied {
      background: rgba(52, 211, 153, 0.2);
      color: #6ee7b7;
      border-color: #34d399;
    }
    .btn-open {
      background: rgba(255, 255, 255, 0.05);
      color: rgba(255,255,255,0.6);
    }
    .btn-open:hover {
      background: rgba(255, 255, 255, 0.12);
      color: #fff;
    }
    .footer {
      margin-top: 30px;
      text-align: center;
      color: rgba(255, 255, 255, 0.25);
      font-size: 13px;
      letter-spacing: 0.3px;
    }
    .footer a {
      color: rgba(255, 255, 255, 0.3);
      text-decoration: none;
      border-bottom: 1px dotted rgba(255,255,255,0.1);
    }
    .footer a:hover {
      color: rgba(255,255,255,0.6);
    }
    /* 复制提示 Toast */
    .toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: rgba(0,0,0,0.8);
      backdrop-filter: blur(8px);
      color: #fff;
      padding: 12px 28px;
      border-radius: 60px;
      font-size: 14px;
      font-weight: 500;
      opacity: 0;
      transition: all 0.35s ease;
      pointer-events: none;
      border: 1px solid rgba(255,255,255,0.08);
    }
    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
    @media (max-width: 480px) {
      .container { padding: 28px 16px; }
      .card { padding: 16px; flex-direction: column; align-items: stretch; }
      .card .actions { justify-content: flex-end; }
      .btn { padding: 6px 14px; font-size: 12px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1><i class="fas fa-cube" style="color:#a78bfa; margin-right: 10px;"></i>我的工具箱</h1>
    <div class="subtitle">点击复制链接 · 一键直达</div>

    <!-- 卡片：明文 -->
    <div class="card">
      <div class="label">
        <i class="fas fa-file-alt"></i>
        <span>明文 <span class="badge">JSON</span></span>
      </div>
      <div class="actions">
        <button class="btn btn-copy" onclick="copyLink('https://json.614118.xyz/backend/jian_box/raw/jian_box_raw.json', this)">
          <i class="fas fa-copy"></i> 复制
        </button>
        <a href="https://json.614118.xyz/backend/jian_box/raw/jian_box_raw.json" target="_blank" class="btn btn-open">
          <i class="fas fa-arrow-up-right-from-square"></i>
        </a>
      </div>
    </div>

    <!-- 卡片：密文 -->
    <div class="card">
      <div class="label">
        <i class="fas fa-lock"></i>
        <span>密文 <span class="badge">ENC</span></span>
      </div>
      <div class="actions">
        <button class="btn btn-copy" onclick="copyLink('https://json.614118.xyz/backend/jian_box/jian_box.enc', this)">
          <i class="fas fa-copy"></i> 复制
        </button>
        <a href="https://json.614118.xyz/backend/jian_box/jian_box.enc" target="_blank" class="btn btn-open">
          <i class="fas fa-arrow-up-right-from-square"></i>
        </a>
      </div>
    </div>

    <div class="footer">
      <i class="fas fa-cloud"></i> 托管于 Cloudflare · 自定义域 <a href="https://json.614118.xyz" target="_blank">json.614118.xyz</a>
    </div>
  </div>

  <!-- Toast 提示 -->
  <div id="toast" class="toast">✅ 已复制到剪贴板</div>

  <script>
    function copyLink(url, btn) {
      // 复制到剪贴板
      navigator.clipboard.writeText(url).then(() => {
        // 按钮反馈
        const originalHTML = btn.innerHTML;
        btn.innerHTML = '<i class="fas fa-check"></i> 已复制';
        btn.classList.add('copied');
        // 显示 Toast
        const toast = document.getElementById('toast');
        toast.textContent = '✅ 已复制：' + url;
        toast.classList.add('show');
        setTimeout(() => {
          toast.classList.remove('show');
        }, 2000);
        // 恢复按钮
        setTimeout(() => {
          btn.innerHTML = originalHTML;
          btn.classList.remove('copied');
        }, 1800);
      }).catch(() => {
        // 降级方案：选中并提示手动复制
        const input = document.createElement('input');
        input.value = url;
        document.body.appendChild(input);
        input.select();
        document.execCommand('copy');
        document.body.removeChild(input);
        alert('已复制到剪贴板（降级方式）');
      });
    }
  </script>
</body>
</html>
