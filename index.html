<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>导航 · 工具箱</title>
  <!-- 引入 Tailwind CSS (CDN) -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Font Awesome 图标库 (可选) -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <!-- 自定义微调 (非必须) -->
  <style>
    /* 仅用于复制按钮的反馈动画，Tailwind 无法覆盖的细节 */
    .btn-copy.copied {
      background-color: #34d399 !important;
      color: #fff !important;
    }
    .toast {
      transition: all 0.3s ease;
      opacity: 0;
      transform: translateY(20px);
    }
    .toast.show {
      opacity: 1;
      transform: translateY(0);
    }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4 bg-gradient-to-br from-[#0f0c29] via-[#302b63] to-[#24243e] font-sans">

  <!-- 主卡片 -->
  <div class="max-w-lg w-full bg-white/10 backdrop-blur-xl rounded-3xl p-8 shadow-2xl border border-white/10 transition-all hover:shadow-3xl">
    
    <!-- 标题 -->
    <div class="text-center mb-8">
      <h1 class="text-3xl font-bold text-white flex items-center justify-center gap-2">
        <i class="fas fa-cube text-purple-400"></i> 我的工具箱
      </h1>
      <p class="text-white/50 text-sm mt-1 border-b border-white/10 pb-4">一键复制链接 · 极速直达</p>
    </div>

    <!-- 卡片：明文 -->
    <div class="bg-white/5 rounded-2xl p-4 mb-4 flex items-center justify-between flex-wrap gap-3 border border-white/5 hover:bg-white/10 hover:border-purple-400/30 transition-all hover:-translate-y-0.5 hover:shadow-lg">
      <div class="flex items-center gap-3 text-white font-medium">
        <i class="fas fa-file-alt text-purple-400 text-xl w-6"></i>
        <span>明文 JSON</span>
        <span class="text-xs bg-purple-400/20 text-purple-300 px-2 py-0.5 rounded-full">RAW</span>
      </div>
      <div class="flex gap-2">
        <button onclick="copyLink('https://json.614118.xyz/backend/jian_box/raw/jian_box_raw.json', this)" 
                class="btn-copy bg-purple-400/20 hover:bg-purple-400/40 text-purple-300 hover:text-white px-4 py-1.5 rounded-full text-sm font-medium border border-purple-400/20 hover:border-purple-400 transition flex items-center gap-1.5">
          <i class="fas fa-copy"></i> 复制
        </button>
        <a href="https://json.614118.xyz/backend/jian_box/raw/jian_box_raw.json" target="_blank" 
           class="bg-white/5 hover:bg-white/20 text-white/50 hover:text-white px-3 py-1.5 rounded-full text-sm transition flex items-center gap-1">
          <i class="fas fa-arrow-up-right-from-square"></i>
        </a>
      </div>
    </div>

    <!-- 卡片：密文 -->
    <div class="bg-white/5 rounded-2xl p-4 mb-6 flex items-center justify-between flex-wrap gap-3 border border-white/5 hover:bg-white/10 hover:border-purple-400/30 transition-all hover:-translate-y-0.5 hover:shadow-lg">
      <div class="flex items-center gap-3 text-white font-medium">
        <i class="fas fa-lock text-purple-400 text-xl w-6"></i>
        <span>密文 ENC</span>
        <span class="text-xs bg-amber-400/20 text-amber-300 px-2 py-0.5 rounded-full">加密</span>
      </div>
      <div class="flex gap-2">
        <button onclick="copyLink('https://json.614118.xyz/backend/jian_box/jian_box.enc', this)" 
                class="btn-copy bg-purple-400/20 hover:bg-purple-400/40 text-purple-300 hover:text-white px-4 py-1.5 rounded-full text-sm font-medium border border-purple-400/20 hover:border-purple-400 transition flex items-center gap-1.5">
          <i class="fas fa-copy"></i> 复制
        </button>
        <a href="https://json.614118.xyz/backend/jian_box/jian_box.enc" target="_blank" 
           class="bg-white/5 hover:bg-white/20 text-white/50 hover:text-white px-3 py-1.5 rounded-full text-sm transition flex items-center gap-1">
          <i class="fas fa-arrow-up-right-from-square"></i>
        </a>
      </div>
    </div>

    <!-- 页脚 -->
    <div class="text-center text-white/20 text-xs flex items-center justify-center gap-2">
      <i class="fas fa-cloud"></i> 托管于 Cloudflare ·
      <a href="https://json.614118.xyz" target="_blank" class="text-white/30 hover:text-white/60 border-b border-white/10 hover:border-white/30 transition">json.614118.xyz</a>
    </div>
  </div>

  <!-- Toast 提示 -->
  <div id="toast" class="toast fixed bottom-8 left-1/2 -translate-x-1/2 bg-black/80 backdrop-blur-sm text-white px-6 py-3 rounded-full text-sm font-medium border border-white/10 pointer-events-none">
    ✅ 已复制到剪贴板
  </div>

  <script>
    function copyLink(url, btn) {
      navigator.clipboard.writeText(url).then(() => {
        // 反馈：按钮变绿
        const originalHTML = btn.innerHTML;
        btn.innerHTML = '<i class="fas fa-check"></i> 已复制';
        btn.classList.add('copied');
        // Toast 显示
        const toast = document.getElementById('toast');
        toast.textContent = '✅ 已复制：' + url;
        toast.classList.add('show');
        setTimeout(() => {
          toast.classList.remove('show');
        }, 2000);
        // 恢复按钮
        setTimeout(() => {
          btn.innerHTML = originalHTML;
          btn.classList.remove('copied');
        }, 1800);
      }).catch(() => {
        // 降级方案
        const input = document.createElement('input');
        input.value = url;
        document.body.appendChild(input);
        input.select();
        document.execCommand('copy');
        document.body.removeChild(input);
        alert('已复制（降级方式）');
      });
    }
  </script>
</body>
</html>
